<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Restaurant POS System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #8b0000, #b30000);
    color: white;
    padding: 15px;
    font-size: 22px;
    text-align: center;
    font-weight: bold;
}

/* LAYOUT */
.container {
    display: flex;
    height: 92vh;
}

/* MENU */
.menu {
    width: 70%;
    overflow-y: auto;
    padding: 10px;
}

/* ORDER */
.order {
    width: 30%;
    background: white;
    border-left: 2px solid #ddd;
    padding: 10px;
}

/* CATEGORY */
.cat {
    background: #222;
    color: white;
    padding: 8px;
    margin-top: 12px;
    border-radius: 5px;
    font-weight: bold;
}

/* ITEM */
.item {
    background: white;
    margin: 5px 0;
    padding: 10px;
    border-left: 5px solid #b30000;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
}

.item:hover {
    background: #ffe5e5;
}

/* ORDER ITEM */
.order-item {
    padding: 6px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
}

/* BUTTONS */
button {
    border: none;
    padding: 8px;
    border-radius: 5px;
    cursor: pointer;
}

.clear {
    background: red;
    color: white;
    width: 100%;
    margin-top: 10px;
}

.send {
    background: green;
    color: white;
    width: 100%;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.popup-box {
    background: white;
    padding: 20px;
    width: 320px;
    border-radius: 10px;
}

.opt {
    background: #eee;
    padding: 8px;
    margin: 5px 0;
    cursor: pointer;
    border-radius: 5px;
}

.opt:hover {
    background: #ddd;
}
</style>
</head>

<body>

<header>🍛 Restaurant POS System</header>

<div class="container">

<!-- MENU -->
<div class="menu" id="menu"></div>

<!-- ORDER -->
<div class="order">
<h3>🧾 Order</h3>
<div id="order"></div>

<button class="send" onclick="sendOrder()">Send Order</button>
<button class="clear" onclick="clearOrder()">Clear</button>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3 id="title"></h3>

        <p>Choose Rice:</p>
        <div class="opt" onclick="addOption('Pilau Rice')">Pilau Rice</div>
        <div class="opt" onclick="addOption('Boiled Rice')">Boiled Rice</div>
        <div class="opt" onclick="addOption('Egg Fried Rice')">Egg Fried Rice</div>

        <p>OR Naan:</p>
        <div class="opt" onclick="addOption('Plain Nan')">Plain Nan</div>
        <div class="opt" onclick="addOption('Garlic Nan')">Garlic Nan</div>
        <div class="opt" onclick="addOption('Cheese Nan')">Cheese Nan</div>

        <button onclick="closePopup()" style="margin-top:10px;">Close</button>
    </div>
</div>

<script>

/* FULL MENU */
const menuData = {
"STARTERS": {
  "Chicken": ["Chicken Tikka","Tandoori Chicken","Chicken Chaat","Chicken Pakora","Salted Chilli Chicken","Fusion Tandoori Mix","Fusion Tapas","Zara Special"],
  "Lamb": ["Lamb Tikka","Sheekh Kebab","Fusion Tandoori Mix","Zara Special"],
  "Prawn": ["King Prawn Puri","Butterfly King Prawn","Salted Chilli King Prawn","Fusion Tandoori Mix"],
  "Vegetarian": ["Meat or Vegetable Samosa","Onion Bhaji","Vegetable Pakora","Aloo Chaat","Vegetable Platter"]
},

"TANDOORI SPECIALITIES": {
  "Chicken": ["Chicken Tikka","Tandoori Chicken","Fusion Mixed Platter"],
  "Lamb": ["Lamb Tikka","Sashlik","Fusion Mixed Platter"],
  "Prawn": ["Tandoori King Prawn","Tandoori Mixed","Fusion Mixed Platter"],
  "Fish": ["Salmon Tikka"],
  "Vegetarian": ["Paneer Tikka"]
},

"CHICKEN": ["Chicken Tikka Masala","Low Fat Chicken Tikka Masala","Low Fat Chicken Tikka Balti","Low Fat Chicken Balti","Chicken Balti","Chicken Tikka Balti","Chicken Saag Balti","Tandoori Chicken Balti","Chicken and King Prawn Balti","Chicken and Mushroom Balti","Chicken and Lamb Balti","Masala Fusion Special","Chicken Badam Passanda","Chicken Karahi","Makhani","Roshni","Monposond","Jal Jalf","Garlic Chilli Chicken","South Indian Garlic Chilli","Dopiaza","Garlic Chicken","Garlic Chilli","Hara Mirchi","Rajastani","Nagpuri","Zara Special","Chicken Curry","Chicken Madras","Chicken Vindaloo","Chicken Jalfrezi","Chicken Sagwalla","Chicken Dopiaza","Chicken Bhuna","Chicken Korma","Chicken Rogan Josh","Chicken Pathia","Chicken Dansak","Chicken Bhuna (Kids)","Chicken Korma (Kids)","Chicken Tikka Masala (Kids)","Grilled Chicken and Chips","Chicken Nuggets and Chips","Chicken Goujons and Chips"],

"LAMB": ["Lamb Tikka Masala","Low Fat Lamb Tikka Masala","Low Fat Lamb Tikka Madras","Low Fat Lamb Tikka Balti","Lamb Balti","Lamb Tikka Balti","Lamb Saag Balti","Chicken and Lamb Balti","Keema Balti","Masala Fusion Special","Lamb Badam Passanda","Lamb Karahi","Monposond","Jal Jalf","Garlic Chilli","Hara Mirchi","Rajastani","Nagpuri","Zara Special","Lamb Curry","Lamb Madras","Lamb Vindaloo","Lamb Jalfrezi","Lamb Sagwalla","Lamb Dopiaza","Lamb Bhuna","Lamb Korma","Lamb Rogan Josh","Lamb Pathia","Lamb Dansak"],

"PRAWN": ["Tandoori King Prawn Masala","King Prawn Balti","Chicken and King Prawn Balti","Tropical Balti","Spicy King Prawn","Tamarind King Prawn"],

"FISH": ["Fish Rezella","Salmon Bahar","Salmon Tikka","Fusion Fish Combo","Seabass Special","Scampi"],

"VEGETARIAN": ["Vegetable Balti","Mushroom Balti","Low Fat Vegetable Masala","Low Fat Vegetable Balti","Low Fat Quorn Tikka Masala","Low Fat Quorn Tikka Madras","Low Fat Quorn Tikka Balti","Mixed Vegetable Bhaji","Vegetable Curry","Mushroom Bhaji","Aloo Gobi","Bombay Aloo","Cauliflower Bhaji","Mattar Paneer","Saag Paneer","Tarka Dal","Saag Aloo","Aloo Chana Bhaji","Bhindi Bhaji","Vegetable Madras","Vegetable Vindaloo","Vegetable Jalfrezi","Vegetable Sagwalla","Vegetable Dopiaza","Vegetable Bhuna","Vegetable Korma","Vegetable Rogan Josh","Vegetable Pathia","Vegetable Dansak"],

"BIRYANIS": ["Fusion Special Biryani","Chicken Tikka Biryani","Chicken Biryani","Lamb Tikka Biryani","Lamb Biryani","King Prawn Biryani","Vegetable Biryani","Hyderabadi Biryani"],

"EUROPEAN": ["Sirloin Steak","Grilled Chicken Steak","Chicken Nuggets","Scampi","Chicken Omelette","Cheese Omelette","Mushroom Omelette","Fried Chicken Special"],

"RICE": ["Pilau Rice","Boiled Rice","Mushroom Fried Rice","Egg Fried Rice","Vegetable Pilau","Keema Pilau","Coconut Rice","Special Rice"],

"BREAD": ["Nan","Peshwari Nan","Garlic Nan","Chilli Nan","Cheese Nan","Cheese and Garlic Nan","Keema Nan","Paratha","Chapati","Roti","Chips"],

"SIDES": ["Popadom","Mint Dips","Chilli Dips","Mixed Pickle","Onion Salad","Mango Chutney","Curry Sauce","Masala Sauce","Balti Sauce","Korma Sauce","Mixed Raita","Cucumber Raita","Green Salad"],

"DRINKS": ["Coca Cola (Bottle)","Diet Coke (Bottle)","Fanta (Bottle)","Sprite (Bottle)","Pepsi (Bottle)","Coca Cola (Can)","Diet Coke (Can)","Fanta (Can)","Sprite (Can)","Pepsi (Can)"]
};

let order = [];
let currentItem = "";

/* MAIN RENDER */
function renderMenu(){
    const menu = document.getElementById("menu");

    for(let cat in menuData){
        menu.innerHTML += `<div class='cat'>${cat}</div>`;

        let items = menuData[cat];

        if(Array.isArray(items)){
            items.forEach(i=>{
                menu.innerHTML += `<div class='item' onclick="selectItem('${i}','${cat}')">${i}<span>+</span></div>`;
            });
        } else {
            for(let sub in items){
                menu.innerHTML += `<div style="padding-left:10px;color:#444;font-weight:bold">${sub}</div>`;
                items[sub].forEach(i=>{
                    menu.innerHTML += `<div class='item' onclick="selectItem('${i}','${cat}')">${i}<span>+</span></div>`;
                });
            }
        }
    }
}

function selectItem(item, cat){
    currentItem = item;
    currentCat = cat;

    if(["CHICKEN","LAMB","PRAWN","FISH","VEGETARIAN"].includes(cat)){
        document.getElementById("popup").style.display = "flex";
        document.getElementById("title").innerText = item;
    } else {
        order.push(item);
        updateOrder();
    }
}

function addOption(opt){
    order.push(currentItem + " + " + opt);
    updateOrder();
    closePopup();
}

function updateOrder(){
    const o = document.getElementById("order");
    o.innerHTML = "";

    order.forEach((i, idx)=>{
        o.innerHTML += `
        <div class="order-item">
            ${i}
            <button onclick="removeItem(${idx})">❌</button>
        </div>`;
    });
}

function removeItem(i){
    order.splice(i,1);
    updateOrder();
}

function clearOrder(){
    order = [];
    updateOrder();
}

function sendOrder(){
    alert("Order sent to kitchen!");
    console.log(order);
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

renderMenu();

</script>

</body>
</html>
